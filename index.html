<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a192f">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Time2Freedive">
    <title>Time2Freedive - Gran Canaria</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-background"></div>
    
    <main class="container">
        <header>
            <img id="main-logo" src="images/logo.png" alt="Time2Freedive Logo" class="app-logo">
            <h1>Time2Freedive</h1>
            <p>Descubre dónde hacer apnea hoy en Gran Canaria</p>
        </header>

        <section class="controls">
            <div id="date-controls" class="hidden">
                <button id="prev-day-btn" class="icon-btn" title="Día Anterior">&lt;</button>
                <div class="calendar-wrapper">
                    <button id="current-date-display" class="date-btn">Cargando...</button>
                    <div id="calendar-dropdown" class="calendar-dropdown hidden glass">
                        <div class="calendar-header">
                            <button id="cal-prev-month">&lt;</button>
                            <span id="cal-month-year">Mes</span>
                            <button id="cal-next-month">&gt;</button>
                        </div>
                        <div class="calendar-grid">
                            <div class="cal-days-header">
                                <span class="cal-day-name">Lu</span><span class="cal-day-name">Ma</span><span class="cal-day-name">Mi</span><span class="cal-day-name">Ju</span><span class="cal-day-name">Vi</span><span class="cal-day-name">Sa</span><span class="cal-day-name">Do</span>
                            </div>
                            <div id="cal-days" class="cal-days"></div>
                        </div>
                    </div>
                </div>
                <button id="next-day-btn" class="icon-btn" title="Día Siguiente">&gt;</button>
            </div>
            
            <div id="hour-slider-container" class="hidden">
                <label for="hour-slider">Hora: <span id="hour-display">12:00</span></label>
                <input type="range" id="hour-slider" min="0" max="23" value="12" step="1">
            </div>
            
            <div id="view-toggle" class="view-toggle hidden">
                <button id="btn-map-view" class="view-btn active">Mapa</button>
                <button id="btn-list-view" class="view-btn">Lista</button>
            </div>
        </section>

        <!-- Loading State -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Consultando a Poseidón (Open-Meteo)...</p>
        </div>

        <div id="results-container" class="layout hidden">
            <div class="map-wrapper glass">
                <div id="map"></div>
            </div>
            <div class="cards-wrapper hidden">
                <div id="locations-list"></div>
            </div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
